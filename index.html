  </div>
  <div class="banner-right">
    <a class="social-icon" href="https://www.facebook.com/hoctienganhquatrochoi" target="_blank" rel="noopener noreferrer" aria-label="Facebook">

      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.5 2 2 5.9 2 10.7c0 2.8 1.6 5.3 4 6.9-.1.9-.5 2.2-1.4 3.4-.2.2 0 .5.3.5 1.7-.2 3.4-1 4.6-1.9 .8.2 1.6.3 2.5.3 5.5 0 10-3.9 10-8.7S17.5 2 12 2zm-4.8 10.2h-.9V8.4h2.9v.8H8.1v1.1h1.9v.8H8.1v1.1h2v.8H7.2zm5.6 0h-3.1v-.7l2-3.3h-1.9v-.8h3v.7l-2 3.3h2z"/></svg>

    <button class="refresh-btn" id="refreshBtn" type="button" title="Bấm nếu bài không cập nhật nội dung mới">🔄 Làm mới</button>
    <div id="authArea"></div>
  </div>
</header>

<div class="app-body">
  <button class="sidebar-toggle-btn" id="sidebarToggleBtn" type="button">☰ Menu</button>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content" id="mainContent">
    <div class="placeholder">Chọn một dạng bài ở menu bên trái để bắt đầu học</div>
  </main>
</div>

<div class="login-modal-overlay" id="rankingModalOverlay" style="display:none">
  <div class="ranking-modal">
    <div class="ranking-modal-header">
      <h3>🏅 Xếp hạng chuyên cần nhóm mình</h3>
      <button type="button" class="ranking-modal-close" id="closeRankingModalBtn">✕</button>
    </div>
    <div id="rankingModalBody"></div>
  </div>
</div>

<div class="login-modal-overlay" id="todayModalOverlay" style="display:none">
  <div class="ranking-modal">
    <div class="ranking-modal-header">
      <h3>📋 Hôm nay em đã học gì</h3>
      <button type="button" class="ranking-modal-close" id="closeTodayModalBtn">✕</button>
    </div>
    <div id="todayModalBody"></div>
  </div>
</div>

<div class="login-modal-overlay" id="loginModalOverlay" style="display:none">
  <div class="login-modal">
    <h3>Đăng nhập học sinh</h3>
    <div class="admin-field">
      <label>Tài khoản</label>
      <input type="text" id="loginUsername">
    </div>
    <div class="admin-field">
      <label>Mã PIN</label>
      <div class="password-input-wrap">
        <input type="password" id="loginPin">
        <button type="button" class="password-toggle-btn" data-target="loginPin">👁️</button>
      </div>
    </div>
    <div class="login-modal-status" id="loginStatus"></div>
    <div class="login-modal-actions">
      <button class="login-modal-btn login-modal-btn-cancel" id="loginCancelBtn" type="button">Hủy</button>
      <button class="login-modal-btn login-modal-btn-submit" id="loginSubmitBtn" type="button">Đăng nhập</button>
    </div>
  </div>
</div>
